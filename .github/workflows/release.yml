name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows x64
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS ARM
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS Intel
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nexterm/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            nexterm/src-tauri/target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('nexterm/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libdbus-1-dev \
            patchelf

      - name: Install frontend dependencies
        working-directory: nexterm
        run: npm ci

      - name: Verify assets
        working-directory: nexterm
        shell: bash
        run: |
          ls public/fonts/*.woff2
          ls src-tauri/icons/icon.ico src-tauri/icons/icon.icns src-tauri/icons/icon.png

      - name: Build Tauri app
        working-directory: nexterm
        shell: bash
        run: npx tauri build --target ${{ matrix.target }}

      - name: Upload Windows artifacts
        if: matrix.target == 'x86_64-pc-windows-msvc'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            nexterm/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            nexterm/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi

      - name: Upload macOS ARM artifacts
        if: matrix.target == 'aarch64-apple-darwin'
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm-installers
          path: |
            nexterm/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

      - name: Upload macOS Intel artifacts
        if: matrix.target == 'x86_64-apple-darwin'
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel-installers
          path: |
            nexterm/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg

      - name: Upload Linux artifacts
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: |
            nexterm/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            nexterm/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm
            nexterm/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage

  release:
    needs: build
    runs-on: ubuntu-latest
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: List all artifacts
        run: find artifacts -type f | head -50

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'NovaTerm ${{ github.ref_name }}'
          draft: true
          prerelease: false
          body: |
            ## NovaTerm ${{ github.ref_name }}

            Download the installer for your platform below.

            ### Windows
            - `.exe` - NSIS installer (recommended)
            - `.msi` - Windows Installer

            ### macOS
            - `.dmg (aarch64)` - Apple Silicon (M1/M2/M3/M4)
            - `.dmg (x64)` - Intel Mac

            ### Linux
            - `.AppImage` - Portable (no install needed)
            - `.deb` - Debian/Ubuntu
            - `.rpm` - Fedora/RHEL
          files: |
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.dmg
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
